{% extends "base.html" %}

{% block title %}Sign in | CampusLink{% endblock %}

{% block content %}
<div class="cl-auth-panel py-2">
    <div class="cl-auth-card campus-form">
        <h1 class="h4 fw-bold mb-1">Welcome back</h1>
        <p class="text-muted small mb-4">Sign in to your CampusLink account.</p>
        <form method="post" action="{{ url_for('auth.login') }}" novalidate>
            <input type="hidden" name="next" value="{{ next or '' }}">
            <div class="mb-3">
                <label for="identifier" class="form-label">Username or email</label>
                <input
                    type="text"
                    class="form-control"
                    id="identifier"
                    name="identifier"
                    required
                    autocomplete="username"
                >
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    required
                    autocomplete="current-password"
                >
            </div>
            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                <label class="form-check-label small" for="remember">Stay signed in</label>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Sign in</button>
                <a class="btn btn-link small" href="{{ url_for('auth.register') }}">Create an account</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
