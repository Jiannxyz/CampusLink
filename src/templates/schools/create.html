{% extends "base.html" %}

{% block title %}Add school | CampusLink{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="{{ url_for('schools.list_schools') }}">Schools</a></li>
        <li class="breadcrumb-item active" aria-current="page">Add</li>
    </ol>
</nav>

<h1 class="h3 mb-4">Add school</h1>

<form method="post" action="{{ url_for('schools.create_school') }}" novalidate class="col-xl-10">
    {% include "schools/_form_fields.html" %}
    <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save school</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('schools.list_schools') }}">Cancel</a>
    </div>
</form>
{% endblock %}
