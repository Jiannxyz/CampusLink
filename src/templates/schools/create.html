{% extends "base.html" %}

{% block title %}Add school | CampusLink{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-xl-10">
        <nav aria-label="breadcrumb" class="cl-breadcrumb mb-3">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="{{ url_for('schools.list_schools') }}">Schools</a></li>
                <li class="breadcrumb-item active" aria-current="page">Add</li>
            </ol>
        </nav>

        <div class="cl-card border-0 p-4 p-md-5">
            <h1 class="h3 fw-bold mb-4">Add school</h1>
            <form method="post" action="{{ url_for('schools.create_school') }}" novalidate class="campus-form">
                {% include "schools/_form_fields.html" %}
                <div class="mt-4 d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-primary px-4">Save school</button>
                    <a class="btn btn-outline-secondary" href="{{ url_for('schools.list_schools') }}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
