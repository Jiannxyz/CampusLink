{% extends "base.html" %}

{% block title %}Edit post | CampusLink{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-xl-8">
        <nav aria-label="breadcrumb" class="cl-breadcrumb mb-3">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="{{ url_for('posts.feed') }}">Feed</a></li>
                <li class="breadcrumb-item active" aria-current="page">Edit</li>
            </ol>
        </nav>

        <div class="cl-card border-0 p-4 p-md-5 mb-4">
            <h1 class="h3 fw-bold mb-4">Edit post</h1>
            <form method="post" action="{{ url_for('posts.edit_post', post_id=post.post_id) }}" novalidate class="campus-form">
                {% include "posts/_form_fields.html" %}
                <div class="mt-4 d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-primary px-4">Save changes</button>
                    <a class="btn btn-outline-secondary" href="{{ url_for('posts.feed') }}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
