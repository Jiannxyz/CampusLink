{% extends "base.html" %}

{% block title %}Edit post | CampusLink{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="{{ url_for('posts.feed') }}">Feed</a></li>
        <li class="breadcrumb-item active" aria-current="page">Edit</li>
    </ol>
</nav>

<h1 class="h3 mb-4">Edit post</h1>

<form method="post" action="{{ url_for('posts.edit_post', post_id=post.post_id) }}" novalidate class="col-xl-8">
    {% include "posts/_form_fields.html" %}
    <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save changes</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('posts.feed') }}">Cancel</a>
    </div>
</form>
{% endblock %}
