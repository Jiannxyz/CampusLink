<button
    type="button"
    class="btn btn-sm rounded-pill border-0 cl-theme-toggle d-inline-flex align-items-center justify-content-center"
    data-cl-theme-toggle
    title="Toggle light / dark mode"
    aria-label="Toggle theme"
>
    <i class="bi bi-sun-fill cl-theme-icon cl-theme-icon--light" aria-hidden="true"></i>
    <i class="bi bi-moon-stars-fill cl-theme-icon cl-theme-icon--dark" aria-hidden="true"></i>
</button>
