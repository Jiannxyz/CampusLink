{% import "macros/avatar.html" as av %}
<div class="dropdown campus-user-dropdown">
    <button
        class="btn btn-link text-decoration-none p-0 d-flex align-items-center gap-2 campus-user-dropdown-toggle"
        type="button"
        data-bs-toggle="dropdown"
        data-bs-auto-close="true"
        aria-expanded="false"
        aria-label="Account menu"
    >
        {{ av.avatar_circle(current_user, 38, 'flex-shrink-0') }}
        <span class="d-none d-md-inline small fw-semibold text-body">{{ current_user.username }}</span>
        <i class="bi bi-chevron-down small text-muted"></i>
    </button>
    <ul class="dropdown-menu dropdown-menu-end cl-user-dropdown-menu shadow-lg border-0 py-2">
        <li class="px-3 pb-2 mb-1 border-bottom border-light">
            <div class="d-flex align-items-center gap-2">
                {{ av.avatar_circle(current_user, 48) }}
                <div class="min-w-0">
                    <div class="fw-semibold text-truncate">{{ current_user.first_name }} {{ current_user.last_name }}</div>
                    <div class="small text-muted text-truncate">@{{ current_user.username }}</div>
                </div>
            </div>
        </li>
        <li><a class="dropdown-item rounded-2" href="{{ url_for('profiles.profile_view', username=current_user.username) }}"><i class="bi bi-person me-2 text-primary"></i>View profile</a></li>
        <li><a class="dropdown-item rounded-2" href="{{ url_for('profiles.profile_edit') }}"><i class="bi bi-pencil-square me-2 text-primary"></i>Edit profile</a></li>
        <li><a class="dropdown-item rounded-2" href="{{ url_for('profiles.settings_page') }}"><i class="bi bi-gear me-2 text-primary"></i>Settings</a></li>
        <li><a class="dropdown-item rounded-2" href="{{ url_for('posts.feed', school_id=current_user.school_id) }}"><i class="bi bi-building me-2 text-primary"></i>My school</a></li>
        <li><a class="dropdown-item rounded-2" href="{{ url_for('profiles.saved_events_page') }}"><i class="bi bi-bookmark-star me-2 text-primary"></i>Saved events</a></li>
        <li><hr class="dropdown-divider my-2"></li>
        <li>
            <form method="post" action="{{ url_for('auth.logout') }}" class="px-1">
                <button type="submit" class="dropdown-item rounded-2 text-danger"><i class="bi bi-box-arrow-right me-2"></i>Log out</button>
            </form>
        </li>
    </ul>
</div>
